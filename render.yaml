# Render blueprint — Loop (multi-tenant). New → Blueprint, point it at this repo.
#
# Data lives in Turso (hosted libSQL), NOT on local disk — so this runs on
# Render's FREE instance type. No persistent disk needed; installs survive
# restarts/redeploys because the DB is remote.
#
# Free-tier note: the service spins down after ~15 min idle and cold-starts on
# the next request (~30-60s). Fine for testing and light use; for zero cold
# starts, bump `plan` to `starter`. Either way, data persistence is Turso's job.
services:
  - type: web
    name: loop
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start:oauth
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Generated once by Render; rotating TOKEN_ENC_KEY orphans stored tenant
      # secrets, so treat it as permanent.
      - key: TOKEN_ENC_KEY
        generateValue: true
      - key: SLACK_STATE_SECRET
        generateValue: true
      # --- Turso (create a free DB at turso.tech) ---
      - key: TURSO_DATABASE_URL
        sync: false        # libsql://<your-db>.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false        # from: turso db tokens create <your-db>
      # --- Slack app identity (api.slack.com/apps → Basic Information) ---
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      # The service's public origin, e.g. https://loop.onrender.com (no trailing slash).
      - key: PUBLIC_URL
        sync: false
